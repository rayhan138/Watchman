<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Monitor - Taskbar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --widget-font-size: 11px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      background: transparent !important;
    }

    body {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      color: #e0e0e0;
      overflow: hidden;
      cursor: default;
      height: 100vh;
      display: flex;
      align-items: center;
    }

    body[data-edge="top"],
    body[data-edge="bottom"] {
      justify-content: center;
    }

    body[data-edge="left"],
    body[data-edge="right"] {
      justify-content: flex-start;
    }

    .taskbar-widget {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 4px;
      height: 100%;
      width: 100%;
      background: transparent !important;
      border: none;
      border-radius: 0;
    }

    .stat-group {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0px;
      padding: 1px 4px;
      border-right: none;
      height: 100%;
    }

    .stat-group:last-child {
      border-right: none;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 4px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .stat-arrow {
      font-size: var(--widget-font-size);
      font-weight: 600;
      width: 12px;
      text-align: center;
    }

    .stat-arrow.up {
      color: #ff6b9d;
    }

    .stat-arrow.down {
      color: #00d4ff;
    }

    .stat-value {
      font-size: var(--widget-font-size);
      font-weight: 500;
      min-width: 68px;
      text-align: right;
      color: #d0d0e8;
      letter-spacing: -0.2px;
    }

    .stat-label {
      font-size: var(--widget-font-size);
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .cpu-label {
      color: #ffb74d;
    }

    .mem-label {
      color: #66bb6a;
    }

    .stat-percent {
      font-size: var(--widget-font-size);
      font-weight: 600;
      min-width: 26px;
      text-align: right;
    }

    .cpu-value {
      color: #ffb74d;
    }

    .mem-value {
      color: #66bb6a;
    }

    /* Hover effect */
    .taskbar-widget:hover {
      background: rgba(255, 255, 255, 0.03) !important;
    }

    body[data-mode="network-only"] #cpuMemGroup {
      display: none;
    }

    /* Pulse animation for active data */
    @keyframes dataPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .active-data {
      animation: dataPulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="taskbar-widget" id="taskbarWidget">
    <!-- Network Speed -->
    <div class="stat-group" id="networkGroup">
      <div class="stat-row">
        <span class="stat-arrow up">↑</span>
        <span class="stat-value" id="uploadSpeed">0.00 KB/s</span>
      </div>
      <div class="stat-row">
        <span class="stat-arrow down">↓</span>
        <span class="stat-value" id="downloadSpeed">0.00 KB/s</span>
      </div>
    </div>

    <!-- CPU & Memory -->
    <div class="stat-group" id="cpuMemGroup">
      <div class="stat-row">
        <span class="stat-label cpu-label">CPU</span>
        <span class="stat-percent cpu-value" id="cpuValue">0 %</span>
      </div>
      <div class="stat-row">
        <span class="stat-label mem-label">MEM</span>
        <span class="stat-percent mem-value" id="memValue">0 %</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      function waitForTauri(callback) {
        if (window.__TAURI__) {
          callback();
        } else {
          setTimeout(() => waitForTauri(callback), 50);
        }
      }

      // Embedded mode defaults to fixed positioning.
      document.body.style.webkitAppRegion = 'no-drag';

      waitForTauri(() => {
        const { listen } = window.__TAURI__.event;
        const { invoke } = window.__TAURI__.core;

        const dom = {
          uploadSpeed: document.getElementById('uploadSpeed'),
          downloadSpeed: document.getElementById('downloadSpeed'),
          cpuValue: document.getElementById('cpuValue'),
          memValue: document.getElementById('memValue'),
          widget: document.getElementById('taskbarWidget')
        };

        function formatSpeed(bytesPerSec) {
          if (bytesPerSec < 1024 * 1024) {
            return (bytesPerSec / 1024).toFixed(1) + ' KB/s';
          } else if (bytesPerSec < 1024 * 1024 * 1024) {
            return (bytesPerSec / (1024 * 1024)).toFixed(2) + ' MB/s';
          } else {
            return (bytesPerSec / (1024 * 1024 * 1024)).toFixed(2) + ' GB/s';
          }
        }

        function applyWidgetDisplayMode(payload) {
          const networkOnly = !!(payload && payload.networkOnly);
          document.body.dataset.mode = networkOnly ? 'network-only' : 'full';
        }

        listen('taskbar-placement', (event) => {
          const placement = event.payload || {};
          document.body.dataset.edge = placement.edge || 'bottom';
          document.body.dataset.anchor = placement.anchor || 'tray';
        });

        listen('widget-display-mode-changed', (event) => {
          applyWidgetDisplayMode(event.payload || {});
        });

        listen('metrics', (event) => {
          try {
            const { network: net, cpu, memory: mem } = event.payload;
            if (net) {
              dom.uploadSpeed.textContent = formatSpeed(net.uploadSpeed);
              dom.downloadSpeed.textContent = formatSpeed(net.downloadSpeed);
            }
            if (cpu) {
              dom.cpuValue.textContent = Math.round(cpu.overall) + ' %';
            }
            if (mem) {
              dom.memValue.textContent = Math.round(mem.percentUsed) + ' %';
            }
          } catch (e) {}
        });

        invoke('cmd_get_widget_display_mode')
          .then(applyWidgetDisplayMode)
          .catch(() => {});

        dom.widget.addEventListener('dblclick', () => {
          invoke('cmd_show_history_window').catch(() => {});
        });

        dom.widget.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          event.stopPropagation();
          invoke('cmd_show_widget_context_menu').catch(() => {});
        });
      });
    })();
  </script>
</body>
</html>
