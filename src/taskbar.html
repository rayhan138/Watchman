<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchman - Taskbar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --widget-font-size: 11px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      background: transparent !important;
    }

    body {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      overflow: hidden;
      cursor: default;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d0d0e8;
    }

    body[data-edge="left"],
    body[data-edge="right"] {
      justify-content: flex-start;
    }

    .taskbar-widget {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 4px;
      width: 100%;
      height: 100%;
      min-height: 28px;
      background: transparent !important;
      border: none;
      border-radius: 0;
      transition: background 0.16s ease;
    }

    .taskbar-widget:hover {
      background: rgba(255, 255, 255, 0.03) !important;
    }

    .stat-group {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1px;
      padding: 1px 4px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 4px;
      line-height: 1.05;
      white-space: nowrap;
    }

    .stat-row[hidden],
    .stat-group[hidden] {
      display: none !important;
    }

    .stat-arrow,
    .stat-label,
    .stat-value,
    .stat-percent {
      font-size: var(--widget-font-size);
      font-weight: 700;
    }

    .stat-arrow {
      width: 12px;
      text-align: center;
    }

    .stat-value {
      min-width: 68px;
      text-align: right;
      color: #f5f6f8;
    }

    .stat-percent {
      min-width: 30px;
      text-align: right;
    }

    .stat-arrow.up {
      color: #ff6b9d;
    }

    .stat-arrow.down {
      color: #00d4ff;
    }

    .cpu-label,
    .cpu-value {
      color: #ffb74d;
    }

    .mem-label,
    .mem-value {
      color: #66bb6a;
    }

    body[data-mode="network-only"] #cpuMemGroup {
      display: none !important;
    }

    @keyframes dataPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.84; }
    }

    .active-data {
      animation: dataPulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body data-mode="full">
  <div class="taskbar-widget" id="taskbarWidget">
    <div class="stat-group" id="networkGroup">
      <div class="stat-row" id="uploadRow">
        <span class="stat-arrow up">&#8593;</span>
        <span class="stat-value" id="uploadSpeed">0.0 KB/s</span>
      </div>
      <div class="stat-row" id="downloadRow">
        <span class="stat-arrow down">&#8595;</span>
        <span class="stat-value" id="downloadSpeed">0.0 KB/s</span>
      </div>
    </div>

    <div class="stat-group" id="cpuMemGroup">
      <div class="stat-row" id="cpuRow">
        <span class="stat-label cpu-label">CPU</span>
        <span class="stat-percent cpu-value" id="cpuValue">0%</span>
      </div>
      <div class="stat-row" id="memRow">
        <span class="stat-label mem-label">MEM</span>
        <span class="stat-percent mem-value" id="memValue">0%</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      function waitForTauri(callback) {
        if (window.__TAURI__) {
          callback();
        } else {
          setTimeout(() => waitForTauri(callback), 50);
        }
      }

      document.body.style.webkitAppRegion = 'no-drag';

      waitForTauri(() => {
        const { listen } = window.__TAURI__.event;
        const { invoke } = window.__TAURI__.core;

        const dom = {
          widget: document.getElementById('taskbarWidget'),
          uploadRow: document.getElementById('uploadRow'),
          downloadRow: document.getElementById('downloadRow'),
          cpuMemGroup: document.getElementById('cpuMemGroup'),
          uploadSpeed: document.getElementById('uploadSpeed'),
          downloadSpeed: document.getElementById('downloadSpeed'),
          cpuValue: document.getElementById('cpuValue'),
          memValue: document.getElementById('memValue')
        };

        function formatSpeed(bytesPerSec) {
          if (!bytesPerSec || bytesPerSec < 1024 * 1024) {
            return `${((bytesPerSec || 0) / 1024).toFixed(1)} KB/s`;
          }
          if (bytesPerSec < 1024 * 1024 * 1024) {
            return `${(bytesPerSec / (1024 * 1024)).toFixed(2)} MB/s`;
          }
          return `${(bytesPerSec / (1024 * 1024 * 1024)).toFixed(2)} GB/s`;
        }

        function markActive(row, bytesPerSec) {
          if (!row) return;
          row.classList.toggle('active-data', Number(bytesPerSec || 0) > 0);
        }

        function applyWidgetDisplayMode(payload) {
          const networkOnly = !!(payload && payload.networkOnly);
          document.body.dataset.mode = networkOnly ? 'network-only' : 'full';
        }

        listen('taskbar-placement', (event) => {
          const placement = event.payload || {};
          document.body.dataset.edge = placement.edge || 'bottom';
        });

        listen('widget-display-mode-changed', (event) => {
          applyWidgetDisplayMode(event.payload || {});
        });

        listen('metrics', (event) => {
          try {
            const payload = event.payload || {};
            const network = payload.network || {};
            const cpu = payload.cpu || {};
            const memory = payload.memory || {};

            dom.uploadSpeed.textContent = formatSpeed(network.uploadSpeed);
            dom.downloadSpeed.textContent = formatSpeed(network.downloadSpeed);
            dom.cpuValue.textContent = `${Math.round(cpu.overall || 0)}%`;
            dom.memValue.textContent = `${Math.round(memory.percentUsed || 0)}%`;

            markActive(dom.uploadRow, network.uploadSpeed);
            markActive(dom.downloadRow, network.downloadSpeed);
          } catch (_) {}
        });

        invoke('cmd_get_widget_display_mode')
          .then((payload) => {
            applyWidgetDisplayMode(payload || {});
          })
          .catch(() => {});

        dom.widget.addEventListener('dblclick', () => {
          invoke('cmd_show_history_window').catch(() => {});
        });

        dom.widget.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          event.stopPropagation();
          invoke('cmd_show_widget_context_menu').catch(() => {});
        });
      });
    })();
  </script>
</body>
</html>
