<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchman - Taskbar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --widget-font-size: 11px;
      --row-gap: 2px;
      --widget-gap: 4px;
      --net-width: 66px;
      --metric-width: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      background: transparent !important;
    }

    body {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      overflow: hidden;
      cursor: default;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .taskbar-widget {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      padding: 0 3px;
      width: 100%;
      height: 100%;
      min-height: 30px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.05) !important;
      border: none;
      border-radius: 0;
      pointer-events: auto;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: var(--row-gap);
      justify-content: flex-start;
      line-height: 1.05;
      white-space: nowrap;
      pointer-events: auto;
      min-width: 0;
      overflow: hidden;
    }

    .stat-row[hidden] {
      display: none !important;
    }

    .stat-arrow,
    .stat-label,
    .stat-value,
    .stat-percent {
      font-size: var(--widget-font-size);
      font-weight: 700;
    }

    .stat-arrow {
      width: 12px;
      text-align: center;
    }

    .stat-value {
      min-width: var(--net-width);
      max-width: var(--net-width);
      text-align: right;
      color: #ffffff;
      overflow: hidden;
    }

    .stat-divider {
      width: var(--widget-gap);
      min-width: var(--widget-gap);
    }

    .stat-percent {
      min-width: var(--metric-width);
      max-width: var(--metric-width);
      text-align: right;
    }

    .stat-unit {
      min-width: 6px;
      text-align: left;
      font-size: var(--widget-font-size);
      font-weight: 700;
    }

    .stat-arrow.up {
      color: #f07dac;
    }

    .stat-arrow.down {
      color: #63d6ff;
    }

    .cpu-label,
    .cpu-value,
    .cpu-unit {
      color: #f3b64a;
    }

    .mem-label,
    .mem-value,
    .mem-unit {
      color: #86d96c;
    }

    body[data-mode="network-only"] .system-part,
    body[data-mode="network-only"] .stat-divider {
      display: none !important;
    }

    .taskbar-widget .active-data .stat-value {
      color: #ffffff;
    }

    body[data-edge="left"] .taskbar-widget,
    body[data-edge="right"] .taskbar-widget {
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 2px 0;
    }

    body[data-edge="left"] .stat-row,
    body[data-edge="right"] .stat-row {
      width: 100%;
      justify-content: flex-start;
    }
  </style>
</head>
<body data-mode="full">
  <div class="taskbar-widget" id="taskbarWidget">
    <div class="stat-row" id="uploadRow">
      <span class="stat-arrow up">&#8593;</span>
      <span class="stat-value" id="uploadSpeed">0.0 KB/s</span>
      <span class="stat-divider"></span>
      <span class="stat-label cpu-label system-part">CPU</span>
      <span class="stat-percent cpu-value system-part" id="cpuValue">0</span>
      <span class="stat-unit cpu-unit system-part">%</span>
    </div>
    <div class="stat-row" id="downloadRow">
      <span class="stat-arrow down">&#8595;</span>
      <span class="stat-value" id="downloadSpeed">0.0 KB/s</span>
      <span class="stat-divider"></span>
      <span class="stat-label mem-label system-part">MEM</span>
      <span class="stat-percent mem-value system-part" id="memValue">0</span>
      <span class="stat-unit mem-unit system-part">%</span>
    </div>
  </div>

  <script type="module" src="./taskbar.js"></script>
</body>
</html>
