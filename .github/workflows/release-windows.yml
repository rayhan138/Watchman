name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }

          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release and updater feed
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: v__VERSION__
          releaseName: Watchman v__VERSION__
          releaseBody: |
            Update level: optional

            See the assets below to download and install Watchman.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: watchman-windows-[arch]
